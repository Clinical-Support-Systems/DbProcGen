name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            Directory.Packages.props
            global.json

      - name: Restore
        run: dotnet restore DbProcGen.slnx

      - name: Build solution (ADR 0006, ADR 0001)
        run: dotnet build DbProcGen.slnx --no-restore --nologo

  spec-unit-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            Directory.Packages.props
            global.json

      - name: Restore
        run: dotnet restore DbProcGen.slnx

      - name: Unit tests - parsing/validation (ADR 0003, ADR 0001)
        run: dotnet test --project tests/DbProcGen.Spec.Tests

  snapshot-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            Directory.Packages.props
            global.json

      - name: Restore
        run: dotnet restore DbProcGen.slnx

      - name: Snapshot tests - generated artifacts (ADR 0005, ADR 0004)
        run: dotnet test --project tests/DbProcGen.Tool.Tests

  database-integration-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            Directory.Packages.props
            global.json

      - name: Restore
        run: dotnet restore DbProcGen.slnx

      - name: Placeholder integration tests - SQL deployment and wrapper contract (ADR 0002, ADR 0004)
        run: dotnet test --project tests/DbProcGen.Database.Tests

  runtime-helper-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            Directory.Packages.props
            global.json

      - name: Restore
        run: dotnet restore DbProcGen.slnx

      - name: Runtime helper tests - manifest-based routing (ADR 0007, ADR 0004)
        run: dotnet test --project tests/DbProcGen.Runtime.Tests

  regeneration-guard:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            Directory.Packages.props
            global.json

      - name: Restore
        run: dotnet restore DbProcGen.slnx

      - name: Regenerate artifacts (ADR 0005)
        run: dotnet run --project src/DbProcGen.Tool -- generate

      - name: Guard tracked generated artifacts unchanged after regeneration (ADR 0005)
        run: |
          git add database/Generated
          if ! git diff --cached --quiet -- database/Generated; then
            echo "Generated SQL artifacts changed after regeneration. Run generation locally and commit results."
            git --no-pager diff --cached -- database/Generated
            exit 1
          fi

  sqlproj-build:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            Directory.Packages.props
            global.json

      - name: Restore
        run: dotnet restore DbProcGen.slnx

      - name: Build SQL project (ADR 0002)
        run: dotnet build database/DbProcGen.Database.csproj --nologo

  slopwatch:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            Directory.Packages.props
            global.json

      - name: Install Slopwatch
        run: dotnet tool install --global Slopwatch.Cmd

      - name: Slopwatch analysis
        run: slopwatch analyze -d . --fail-on error --output json

